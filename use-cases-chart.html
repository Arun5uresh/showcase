<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Real-World Applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --bg-soft: #FAFAF5;
    --ink: #000000;
    --ink-1: #1A1A1A;
    --ink-2: #5A5A5A;
    --ink-3: #B0B0B0;
    --line: rgba(0, 0, 0, 0.08);
    --line-2: rgba(0, 0, 0, 0.14);
    --accent: #F5E003;
    --sans: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 48px 24px;
  }
  .wrapper { width: 100%; max-width: 1020px; }

  .eyebrow {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-1); margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .eyebrow::before {
    content: ''; width: 24px; height: 8px; background: var(--accent);
  }
  h1 {
    font-family: var(--sans);
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 300; letter-spacing: -0.025em;
    line-height: 1.1; margin-bottom: 56px; color: var(--ink);
  }
  h1 em {
    font-style: italic; font-weight: 500; color: var(--ink);
    background: linear-gradient(transparent 62%, var(--accent) 62%, var(--accent) 94%, transparent 94%);
    padding: 0 6px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  /* 3-column grid */
  .tiers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid var(--ink);
  }

  /* card */
  .tier {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--line-2);
    transition: background 0.4s var(--ease-out);
  }
  .tier:last-child { border-right: none; }

  /* header band */
  .tier-head {
    padding: 24px 28px;
    display: flex; align-items: center; gap: 14px;
  }
  .tier:nth-child(1) .tier-head { background: var(--ink); color: var(--bg); }
  .tier:nth-child(2) .tier-head { background: var(--accent); color: var(--ink); }
  .tier:nth-child(3) .tier-head { background: var(--bg); color: var(--ink); border-bottom: 1px solid var(--line-2); }

  .tier-num {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 1.4px; font-weight: 600;
    flex-shrink: 0;
  }
  .tier:nth-child(1) .tier-num { color: var(--accent); }
  .tier:nth-child(2) .tier-num { color: var(--ink); }
  .tier:nth-child(3) .tier-num { color: var(--ink-3); }

  .tier-title {
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* pct badge */
  .tier-pct {
    margin-left: auto;
    font-family: var(--mono); font-size: 13px;
    font-weight: 600; letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .tier:nth-child(1) .tier-pct { color: var(--accent); }
  .tier:nth-child(2) .tier-pct { color: var(--ink-2); }
  .tier:nth-child(3) .tier-pct { color: var(--ink-3); }

  /* use case list */
  .tier-list {
    list-style: none;
    padding: 0;
    flex: 1;
  }
  .tier-item {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    line-height: 1.45;
    color: var(--ink-1);
    transition: background 0.3s var(--ease-out);
  }
  .tier-item:last-child { border-bottom: none; }
  .tier-item:hover { background: rgba(245, 224, 3, 0.12); }
  .tier-bullet {
    flex-shrink: 0;
    width: 6px; height: 6px;
    margin-top: 6px;
  }
  .tier:nth-child(1) .tier-bullet { background: var(--ink); }
  .tier:nth-child(2) .tier-bullet { background: var(--accent); border: 1px solid var(--ink); }
  .tier:nth-child(3) .tier-bullet { background: var(--bg); border: 1px solid var(--ink-3); }

  /* footer per card */
  .tier-foot {
    padding: 16px 28px;
    border-top: 2px solid var(--line-2);
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 1.2px; text-transform: uppercase;
    text-align: center;
    margin-top: auto;
  }
  .tier:nth-child(1) .tier-foot { color: var(--ink); font-weight: 600; }
  .tier:nth-child(2) .tier-foot { color: var(--ink-2); }
  .tier:nth-child(3) .tier-foot { color: var(--ink-3); }

  /* caption */
  .caption {
    margin-top: 48px; padding: 28px 32px;
    background: var(--ink); color: var(--bg);
    position: relative;
    font-size: 20px; line-height: 1.4; font-weight: 400;
  }
  .caption::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 6px; background: var(--accent);
  }
  .caption em {
    color: var(--accent); font-weight: 500; font-style: normal;
  }
  .caption .source {
    display: block; margin-top: 12px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 1.4px; color: rgba(255,255,255,0.5);
  }

  @media (max-width: 700px) {
    .tiers { grid-template-columns: 1fr; }
    .tier { border-right: none; border-bottom: 1px solid var(--line-2); }
    .tier:last-child { border-bottom: none; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="eyebrow">Use case mapping</div>
  <h1>Real-World <em>Applications</em></h1>

  <div class="tiers" id="tiers"></div>

  <div class="caption">
    The right architecture depends on the task, not the hype. <em>Most value still comes from simple, deterministic systems.</em>
    <span class="source">&mdash; Leadership &times; AI, Architecture Decision Framework</span>
  </div>
</div>

<script>
(function () {
  var data = [
    {
      num: '01',
      title: 'Deterministic',
      pct: '60%',
      foot: 'High reliability · low cost',
      items: [
        'Data format conversion and ETL',
        'Invoice field extraction',
        'Log parsing and alerting',
        'CRUD operations and webhooks'
      ]
    },
    {
      num: '02',
      title: 'Workflow + LLM',
      pct: '30%',
      foot: 'Moderate cost · human-in-the-loop',
      items: [
        'Email triage and response drafting',
        'Support ticket routing and escalation',
        'Document summarization pipelines',
        'RAG-based Q&A with citations'
      ]
    },
    {
      num: '03',
      title: 'Agentic',
      pct: '10%',
      foot: 'Reserve for true autonomy needs',
      items: [
        'Multi-source research synthesis',
        'Codebase refactoring with test generation',
        'Incident root cause analysis',
        'Open-ended strategic planning'
      ]
    }
  ];

  var container = document.getElementById('tiers');

  data.forEach(function (tier) {
    var card = document.createElement('div');
    card.className = 'tier';

    // header
    var head = document.createElement('div');
    head.className = 'tier-head';
    head.innerHTML =
      '<span class="tier-num">' + tier.num + '</span>' +
      '<span class="tier-title">' + tier.title + '</span>' +
      '<span class="tier-pct">' + tier.pct + '</span>';
    card.appendChild(head);

    // list
    var ul = document.createElement('ul');
    ul.className = 'tier-list';
    tier.items.forEach(function (text) {
      var li = document.createElement('li');
      li.className = 'tier-item';
      li.innerHTML = '<span class="tier-bullet"></span><span>' + text + '</span>';
      ul.appendChild(li);
    });
    card.appendChild(ul);

    // footer
    var foot = document.createElement('div');
    foot.className = 'tier-foot';
    foot.textContent = tier.foot;
    card.appendChild(foot);

    container.appendChild(card);
  });
})();
</script>
</body>
</html>
