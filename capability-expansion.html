<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Who Can Act Has Expanded</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@200;300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --bg-soft: #FAFAF5;
    --ink: #000000;
    --ink-1: #1A1A1A;
    --ink-2: #5A5A5A;
    --ink-3: #B0B0B0;
    --line: rgba(0, 0, 0, 0.08);
    --line-2: rgba(0, 0, 0, 0.14);
    --accent: #F5E003;
    --sans: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 48px 24px;
  }
  .wrapper { width: 100%; max-width: 1020px; }

  .eyebrow {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-1); margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .eyebrow::before {
    content: ''; width: 24px; height: 8px; background: var(--accent);
  }
  h1 {
    font-family: var(--sans);
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 300; letter-spacing: -0.025em;
    line-height: 1.1; margin-bottom: 16px; color: var(--ink);
  }
  h1 em {
    font-style: italic; font-weight: 500; color: var(--ink);
    background: linear-gradient(transparent 62%, var(--accent) 62%, var(--accent) 94%, transparent 94%);
    padding: 0 6px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }
  .subtitle {
    font-size: 18px; line-height: 1.5;
    color: var(--ink-2); font-weight: 300;
    max-width: 48ch;
    margin-bottom: 56px;
  }

  /* panels */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--line-2);
  }
  .panel {
    padding: 48px 40px;
    position: relative;
    min-height: 420px;
  }
  .panel.before-panel {
    background: var(--bg-soft);
    border-right: 1px solid var(--line-2);
  }
  .panel.now-panel {
    background: var(--bg);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .panel.now-panel .click-hint {
    position: absolute;
    bottom: 16px; right: 20px;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--ink-3);
    z-index: 3;
    opacity: 0;
    transition: opacity 0.6s var(--ease-out);
  }
  .panel.now-panel .click-hint.visible { opacity: 1; }
  .panel.now-panel .click-hint.hidden { opacity: 0; }

  .panel-label {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 36px;
    display: flex; align-items: center; gap: 10px;
  }
  .panel-label::before { content: ''; width: 18px; height: 4px; }
  .before-panel .panel-label { color: var(--ink-3); }
  .before-panel .panel-label::before { background: var(--ink-3); }
  .now-panel .panel-label { color: var(--ink); }
  .now-panel .panel-label::before { background: var(--accent); }

  /* role blocks */
  .role-stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 2;
  }
  .role-block {
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.8s var(--ease-out);
  }
  .role-block.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .role-rect {
    flex-shrink: 0;
    transition: all 1.2s var(--ease-out);
  }
  .role-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .role-name {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-1);
    letter-spacing: -0.01em;
  }
  .role-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
  .before-panel .role-tag { color: var(--ink-3); }
  .now-panel .role-tag { color: var(--ink-2); }

  /* canvas overlay for particles */
  .particle-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* caption */
  .caption {
    margin-top: 48px; padding: 28px 32px;
    background: var(--ink); color: var(--bg);
    position: relative;
    font-size: 20px; line-height: 1.4; font-weight: 400;
  }
  .caption::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 6px; background: var(--accent);
  }
  .caption em { color: var(--accent); font-weight: 500; font-style: normal; }
  .caption .source {
    display: block; margin-top: 12px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 1.4px; color: rgba(255,255,255,0.5);
  }

  @media (max-width: 700px) {
    .panels { grid-template-columns: 1fr; }
    .panel.before-panel { border-right: none; border-bottom: 1px solid var(--line-2); }
    .panel { padding: 32px 24px; min-height: 300px; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="eyebrow">Capability surface area</div>
  <h1>Who Can Act Has <em>Expanded</em></h1>
  <p class="subtitle">Capability didn't just improve. It spread.</p>

  <div class="panels">
    <!-- BEFORE panel -->
    <div class="panel before-panel">
      <div class="panel-label">Before</div>
      <div class="role-stack" id="beforeStack"></div>
    </div>
    <!-- NOW panel -->
    <div class="panel now-panel">
      <div class="panel-label">Now</div>
      <canvas class="particle-canvas" id="particleCanvas"></canvas>
      <div class="role-stack" id="nowStack"></div>
      <div class="click-hint" id="clickHint">Click to animate</div>
    </div>
  </div>

  <div class="caption">
    The shift isn't that experts got better. <em>It's that everyone else caught up.</em>
    <span class="source">&mdash; Leadership &times; AI, Capability Expansion</span>
  </div>
</div>

<script>
(function () {

  /* ── Role data ── */
  var beforeRoles = [
    { name: 'Experts',   tag: 'dominant',       w: 180, h: 110, color: '#000000' },
    { name: 'Managers',  tag: 'limited access',  w: 90,  h: 48,  color: '#B0B0B0' },
    { name: 'Operators', tag: 'minimal',         w: 40,  h: 24,  color: '#D4D4D4' }
  ];

  var nowRoles = [
    { name: 'Experts',   tag: 'high',            w: 180, h: 80,  color: '#000000' },
    { name: 'Managers',  tag: 'high',            w: 170, h: 76,  color: '#1A1A1A' },
    { name: 'Operators', tag: 'significantly expanded', w: 150, h: 68, color: '#1A1A1A' }
  ];

  /* ── Build role blocks ── */
  function buildStack(containerId, roles, panelClass) {
    var container = document.getElementById(containerId);
    roles.forEach(function (r, i) {
      var block = document.createElement('div');
      block.className = 'role-block';
      block.dataset.delay = i * 150;

      var rect = document.createElement('div');
      rect.className = 'role-rect';
      rect.style.width = r.w + 'px';
      rect.style.height = r.h + 'px';
      rect.style.background = r.color;
      rect.style.borderRadius = '4px';

      var info = document.createElement('div');
      info.className = 'role-info';
      info.innerHTML = '<span class="role-name">' + r.name + '</span>' +
                       '<span class="role-tag">' + r.tag + '</span>';

      block.appendChild(rect);
      block.appendChild(info);
      container.appendChild(block);
    });
  }

  buildStack('beforeStack', beforeRoles);
  buildStack('nowStack', nowRoles);

  /* ── Animate blocks on scroll ── */
  var blocksAnimated = false;
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting && !blocksAnimated) {
        blocksAnimated = true;
        var blocks = document.querySelectorAll('.role-block');
        blocks.forEach(function (b) {
          var delay = parseInt(b.dataset.delay) || 0;
          setTimeout(function () { b.classList.add('visible'); }, delay);
        });
        // show click hint after blocks appear
        setTimeout(function () {
          document.getElementById('clickHint').classList.add('visible');
        }, 600);
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.querySelector('.panels'));

  /* ── Start particles on click ── */
  var nowPanel = document.querySelector('.now-panel');
  nowPanel.addEventListener('click', function () {
    if (!running) {
      document.getElementById('clickHint').classList.add('hidden');
      startParticles();
    }
  });

  /* ══════════════════════════════════════════
     Particle flow system (Now panel only)
     ══════════════════════════════════════════ */

  var canvas = document.getElementById('particleCanvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var running = false;
  var dpr = window.devicePixelRatio || 1;

  function resizeCanvas() {
    var panel = canvas.parentElement;
    canvas.width = panel.offsetWidth * dpr;
    canvas.height = panel.offsetHeight * dpr;
    canvas.style.width = panel.offsetWidth + 'px';
    canvas.style.height = panel.offsetHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  /* ── Get block positions in panel-relative coords ── */
  function getBlockPositions() {
    var panel = canvas.parentElement;
    var panelRect = panel.getBoundingClientRect();
    var blocks = panel.querySelectorAll('.role-rect');
    var positions = [];
    blocks.forEach(function (b) {
      var r = b.getBoundingClientRect();
      positions.push({
        x: r.left - panelRect.left,
        y: r.top - panelRect.top,
        w: r.width,
        h: r.height
      });
    });
    return positions;
  }

  /* ── Connection paths between blocks ── */
  function getConnections(positions) {
    if (positions.length < 2) return [];
    var conns = [];
    // connect each block to the next one
    for (var i = 0; i < positions.length - 1; i++) {
      var from = positions[i];
      var to = positions[i + 1];
      conns.push({
        x0: from.x + from.w * 0.5,
        y0: from.y + from.h,
        x1: to.x + to.w * 0.5,
        y1: to.y,
        weight: i === 0 ? 0.4 : 0.4 // equal weight
      });
    }
    // also connect first to last (skip connection)
    var first = positions[0];
    var last = positions[positions.length - 1];
    conns.push({
      x0: first.x + first.w,
      y0: first.y + first.h * 0.6,
      x1: last.x,
      y1: last.y + last.h * 0.4,
      weight: 0.2
    });
    return conns;
  }

  /* ── Particle class ── */
  function Particle(conn) {
    this.conn = conn;
    this.t = 0;
    this.speed = 0.003 + Math.random() * 0.004;
    this.size = 2 + Math.random() * 2.5;
    this.trail = [];
    this.maxTrail = 8 + Math.floor(Math.random() * 6);
    // yellow tones with varying opacity
    var alpha = 0.4 + Math.random() * 0.4;
    this.color = 'rgba(245, 224, 3, ' + alpha + ')';
    this.trailColor = 'rgba(245, 224, 3, ';
  }

  Particle.prototype.update = function () {
    this.t += this.speed;
    if (this.t > 1) return false; // done

    var c = this.conn;
    // cubic bezier between start and end
    var mx = (c.x0 + c.x1) / 2;
    var cpY0 = c.y0 + (c.y1 - c.y0) * 0.3;
    var cpY1 = c.y0 + (c.y1 - c.y0) * 0.7;

    var t = this.t;
    var mt = 1 - t;
    // quadratic-ish: use two control points
    var x = mt * mt * mt * c.x0 + 3 * mt * mt * t * mx + 3 * mt * t * t * mx + t * t * t * c.x1;
    var y = mt * mt * mt * c.y0 + 3 * mt * mt * t * cpY0 + 3 * mt * t * t * cpY1 + t * t * t * c.y1;

    // slight horizontal wander
    x += Math.sin(t * Math.PI * 4 + this._seed) * 8;

    this.x = x;
    this.y = y;

    this.trail.push({ x: x, y: y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    return true;
  };

  Particle.prototype.draw = function (ctx) {
    // draw trail
    for (var i = 0; i < this.trail.length; i++) {
      var p = this.trail[i];
      var a = (i / this.trail.length) * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, this.size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = this.trailColor + a + ')';
      ctx.fill();
    }
    // draw head
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  };

  /* ── Spawn logic ── */
  var spawnTimer = 0;
  var connections = [];

  function spawnParticle() {
    if (connections.length === 0) return;
    // weighted random pick
    var totalWeight = 0;
    connections.forEach(function (c) { totalWeight += c.weight; });
    var r = Math.random() * totalWeight;
    var cumul = 0;
    var chosen = connections[0];
    for (var i = 0; i < connections.length; i++) {
      cumul += connections[i].weight;
      if (r <= cumul) { chosen = connections[i]; break; }
    }
    var p = new Particle(chosen);
    p._seed = Math.random() * Math.PI * 2;
    particles.push(p);
  }

  /* ── Animation loop ── */
  function animate() {
    if (!running) return;
    var pw = canvas.width / dpr;
    var ph = canvas.height / dpr;
    ctx.clearRect(0, 0, pw, ph);

    // spawn new particles
    spawnTimer++;
    if (spawnTimer % 3 === 0) { // every ~3 frames
      spawnParticle();
    }

    // update & draw
    var alive = [];
    particles.forEach(function (p) {
      if (p.update()) {
        p.draw(ctx);
        alive.push(p);
      }
    });
    particles = alive;

    // cap particle count
    if (particles.length > 80) {
      particles = particles.slice(particles.length - 80);
    }

    requestAnimationFrame(animate);
  }

  function startParticles() {
    resizeCanvas();
    connections = getConnections(getBlockPositions());
    running = true;
    animate();
  }

  /* ── Handle resize ── */
  var resizeTimeout;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(function () {
      if (running) {
        resizeCanvas();
        connections = getConnections(getBlockPositions());
      }
    }, 200);
  });

})();
</script>
</body>
</html>
